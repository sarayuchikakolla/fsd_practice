<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Survey Page </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Society Survey Page</h1>
    </div>
    <div class="inputs">
    <div>
        Cleanliness Satisfaction
        <input type="radio" name="cleanliness" value="5">5
        <input type="radio" name="cleanliness" value="4">4
        <input type="radio" name="cleanliness" value="3">3
        <input type="radio" name="cleanliness" value="2">2
        <input type="radio" name="cleanliness" value="1">1
    </div>
    <br>
    <div>
        Security Service Feedback
        <input type="radio" name="security" value="5">5
        <input type="radio" name="security" value="4">4
        <input type="radio" name="security" value="3">3
        <input type="radio" name="security" value="2">2
        <input type="radio" name="security" value="1">1
    </div>
    <br>
    <div>
        Parking issue Feedback
        <input type="radio" name="parking" value="5">5
        <input type="radio" name="parking" value="4">4
        <input type="radio" name="parking" value="3">3
        <input type="radio" name="parking" value="2">2
        <input type="radio" name="parking" value="1">1
    </div>
    <br>
    <div>
        Water Supply Feedback
        <input type="radio" name="water_supply" value="5">5
        <input type="radio" name="water_supply" value="4">4
        <input type="radio" name="water_supply" value="3">3
        <input type="radio" name="water_supply" value="2">2
        <input type="radio" name="water_supply" value="1">1
    </div>
    <br>
    <div>
        Maintenance Quality Feedback
        <input type="radio" name="maintenance" value="5">5
        <input type="radio" name="maintenance" value="4">4
        <input type="radio" name="maintenance" value="3">3
        <input type="radio" name="maintenance" value="2">2
        <input type="radio" name="maintenance" value="1">1
    </div>
    <br>
    <div>
        <h1>Suggestion Box</h1>
        <textarea name="suggestion_box" placeholder="Please provide your suggestions here..." rows="10" cols="50"></textarea><br><br>
    </div>
    </div>
</body>
</html>
